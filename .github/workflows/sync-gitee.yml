name: Sync to Gitee
on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to Gitee
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: "https://gitee.com/hyson/qiwu-showcase.git"
          ssh_private_key: ${{ secrets.GITEE_SSH_KEY }}
